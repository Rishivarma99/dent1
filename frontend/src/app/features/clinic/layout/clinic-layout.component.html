<div class="clinic-layout" [class.clinic-layout--sidebar-open]="isSidebarOpen()">
  <app-sidebar
    class="clinic-layout__sidebar"
    [isOpen]="isSidebarOpen()"
    (toggleSidebar)="toggleSidebar()"
    (closeSidebar)="closeSidebar()"
  />

  <app-header
    class="clinic-layout__header"
    (openSidebar)="openSidebar()"
  />

  <main class="clinic-layout__main">
    <router-outlet />
  </main>

  <app-footer class="clinic-layout__footer" />

  @if (isSidebarOpen()) {
    <button
      type="button"
      class="clinic-layout__backdrop"
      aria-label="Close sidebar"
      (click)="closeSidebar()"
    ></button>
  }
</div>
