<section class="dashboard-shell">
  <p-card styleClass="dashboard-card">
    <ng-template #title>
      <h1>Clinic Dashboard</h1>
    </ng-template>

    <p>Select an area to continue.</p>

    <div class="dashboard-actions">
      <button pButton type="button" icon="pi pi-user-md" label="Manage Doctors" (click)="goToDoctors()"></button>

      <button pButton type="button" icon="pi pi-users" severity="secondary" label="Manage Patients" (click)="goToPatients()"></button>

      <button pButton type="button" icon="pi pi-arrow-left" severity="contrast" label="Back to Login" (click)="goToLogin()"></button>
    </div>
  </p-card>
</section>
